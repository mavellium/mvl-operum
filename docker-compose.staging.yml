# Staging environment overrides.
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  app:
    deploy:
      resources:
        limits:
          memory: 512M
    # ─── 1. CONECTANDO NA REDE DO TRAEFIK ───
    env_file:
      - .env
      
    networks:
      - traefik-public 
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mvl-staging.rule=Host(`staging.operum.mavellium.com.br`)"
      - "traefik.http.routers.mvl-staging.entrypoints=websecure"
      - "traefik.http.routers.mvl-staging.tls.certresolver=myresolver"
      # Link this router to the service that declares port 3000 (defined in docker-compose.yml).
      # Without this, Traefik auto-discovers the service and may default to port 80 → 504.
      - "traefik.http.routers.mvl-staging.service=app-${COMPOSE_PROJECT_NAME}"

  api-gateway:
    deploy:
      resources:
        limits:
          memory: 128M
    env_file:
      - .env
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-staging.rule=Host(`api-staging.operum.mavellium.com.br`)"
      - "traefik.http.routers.api-staging.entrypoints=websecure"
      - "traefik.http.routers.api-staging.tls.certresolver=myresolver"
      - "traefik.http.routers.api-staging.service=api-gateway-${COMPOSE_PROJECT_NAME}"

  auth-service:
    deploy:
      resources:
        limits:
          memory: 256M
    env_file:
      - .env

  file-service:
    deploy:
      resources:
        limits:
          memory: 128M
    env_file:
      - .env

  notification-service:
    deploy:
      resources:
        limits:
          memory: 256M
    env_file:
      - .env

  postgres:
    volumes:
      # Named volume scoped to staging
      - staging-pg-data:/var/lib/postgresql/data
    # No ports: block — PostgreSQL must never be reachable from the public internet.
    # For direct access use an SSH tunnel:
    #   ssh -L 5435:127.0.0.1:5432 user@vps -N
    #   then connect to localhost:5435

  redis:
    # Lighter memory limit for staging — must repeat --requirepass because
    # compose command: overrides the base entirely (not appends).
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - staging-redis-data:/data

  minio:
    volumes:
      - staging-minio-data:/data
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio-staging.rule=Host(`storage-staging.operum.mavellium.com.br`)"
      - "traefik.http.routers.minio-staging.entrypoints=websecure"
      - "traefik.http.routers.minio-staging.tls.certresolver=myresolver"
      - "traefik.http.services.minio-staging.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-staging.service=minio-staging"

volumes:
  staging-pg-data:
  staging-redis-data:
  staging-minio-data:

# ─── 3. DECLARAÇÃO DA REDE EXTERNA ───
networks:
  traefik-public:
    external: true
# Staging environment overrides.
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d

services:
  app:
    deploy:
      resources:
        limits:
          memory: 512M
    # ─── 1. CONECTANDO NA REDE DO TRAEFIK ───
    env_file:
      - .env
      
    networks:
      - traefik-public 
    # ─── 2. REGRAS DO DOMÍNIO ───
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mvl-staging.rule=Host(`staging.operum.mavellium.com.br`)"
      - "traefik.http.routers.mvl-staging.entrypoints=websecure"
      - "traefik.http.routers.mvl-staging.tls.certresolver=myresolver" # Gera o SSL (Cadeado Verde) automaticamente

  postgres:
    volumes:
      # Named volume scoped to staging
      - staging-pg-data:/var/lib/postgresql/data

  redis:
    # Lighter memory limit for staging
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - staging-redis-data:/data

  minio:
    volumes:
      - staging-minio-data:/data

volumes:
  staging-pg-data:
  staging-redis-data:
  staging-minio-data:

# ─── 3. DECLARAÇÃO DA REDE EXTERNA ───
networks:
  traefik-public:
    external: true
api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    # Talk to the socket proxy, not the raw Docker socket.
    # socket-proxy exposes only the whitelisted read-only endpoints.
    endpoint: "tcp://socket-proxy:2375"
    exposedByDefault: false
    network: proxy
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  myresolver:
    acme:
      # Use a monitored team/ops mailbox — not a personal address.
      # Certificate expiry warnings go here; losing access = silent HTTPS outage.
      email: ops@mavellium.com.br
      storage: /myresolver/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO

accessLog:
  bufferingSize: 100

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    # Traefik watches the Docker socket — picks up containers from both
    # staging and production networks automatically via labels.
    network: proxy
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  myresolver:
    acme:
      email: tegbe.projetoia@gmail.com
      storage: /myresolver/acme.json
      httpChallenge:
        entryPoint: web

log:
  level: INFO

accessLog:
  bufferingSize: 100

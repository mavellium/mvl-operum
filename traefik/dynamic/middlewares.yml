http:
  middlewares:
    # Rate limiting — applied to the app router
    app-ratelimit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    # Secure headers for all responses
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Powered-By: ""
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true

    # dashboard-auth is defined via Docker label on the traefik service
    # using ${TRAEFIK_DASHBOARD_AUTH} from the VPS .env — not stored here.

version: "3.9"
services:
  postgres:
    ports:
      - "5435:5432"   # Local dev (5432/5433 used by native PostgreSQL on Windows)
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-M4v3ll1um}
      POSTGRES_USER: ${DB_USER:-mvluser}
      POSTGRES_DB: ${DB_NAME:-mvloperum}

  redis:
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes

  api-gateway:
    ports:
      - "4000:4000"

  auth-service:
    ports:
      - "4001:4001"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-mvluser}:${DB_PASSWORD:-M4v3ll1um}@postgres:5432/${DB_NAME:-mvloperum}?schema=public

  project-service:
    ports:
      - "4002:4002"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-mvluser}:${DB_PASSWORD:-M4v3ll1um}@postgres:5432/${DB_NAME:-mvloperum}?schema=public

  sprint-service:
    ports:
      - "4003:4003"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-mvluser}:${DB_PASSWORD:-M4v3ll1um}@postgres:5432/${DB_NAME:-mvloperum}?schema=public

  notification-service:
    ports:
      - "4004:4004"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-mvluser}:${DB_PASSWORD:-M4v3ll1um}@postgres:5432/${DB_NAME:-mvloperum}?schema=public

  file-service:
    ports:
      - "4005:4005"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-mvluser}:${DB_PASSWORD:-M4v3ll1um}@postgres:5432/${DB_NAME:-mvloperum}?schema=public

  minio:
    ports:
      - "9000:9000"   # S3 API — used by Next.js running outside Docker
      - "9001:9001"   # MinIO console (web UI)
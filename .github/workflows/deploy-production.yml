name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true

env:
  DEPLOY_PATH: /opt/mvloperum/production
  IMAGE_NAME: mvloperum/app
  NOTIFICATION_IMAGE: mvloperum/notification-service

jobs:
  # ── 0. Manual confirmation guard ─────────────────────────────────────────────
  confirm:
    name: Confirm
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "Deployment not confirmed. Type 'deploy' in the confirm field."
            exit 1
          fi

  # ── 1. Run tests ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Lint
        run: npm run lint

  # ── 2. Build Docker image ────────────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .
          docker build \
            -t ${{ env.NOTIFICATION_IMAGE }}:${{ github.sha }} \
            -t ${{ env.NOTIFICATION_IMAGE }}:latest \
            ./notification-service

      - name: Save images to tarballs
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} | gzip > app.tar.gz
          docker save ${{ env.NOTIFICATION_IMAGE }}:${{ github.sha }} | gzip > notification-service.tar.gz

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: |
            app.tar.gz
            notification-service.tar.gz
          retention-days: 1

  # ── 3. Deploy to VPS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Transfer image to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "app.tar.gz,notification-service.tar.gz"
          target: /tmp/mvloperum-deploy

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "Loading Docker images..."
            docker load < /tmp/mvloperum-deploy/app.tar.gz
            docker load < /tmp/mvloperum-deploy/notification-service.tar.gz
            rm -f /tmp/mvloperum-deploy/app.tar.gz /tmp/mvloperum-deploy/notification-service.tar.gz

            echo "Tagging images..."
            docker tag mvloperum/app:${{ github.sha }} mvloperum/app:latest
            docker tag mvloperum/notification-service:${{ github.sha }} mvloperum/notification-service:latest

            echo "Running database migrations..."
            cd ${{ env.DEPLOY_PATH }}

            IMAGE_TAG=latest \
            docker compose \
              --env-file .env \
              -f docker-compose.yml \
              -f docker-compose.production.yml \
              --profile migration \
              run --rm migrate

            echo "Restarting services (zero-downtime)..."
            IMAGE_TAG=latest \
            docker compose \
              --env-file .env \
              -f docker-compose.yml \
              -f docker-compose.production.yml \
              up -d app notification-service --no-deps

            echo "Pruning old images..."
            docker image prune -f

            echo "Production deploy complete: ${{ github.sha }}"

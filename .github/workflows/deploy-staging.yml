name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── Security scan (CodeQL + secrets) ─────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (TruffleHog)
        uses: trufflesecurity/trufflehog-actions-scan@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ── Tests, lint, dependency audit ────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm test:run

      - name: Dependency audit
        run: pnpm audit --audit-level=high

  # ── Build, push to ghcr.io, scan image ───────────────────────────────────────
  build:
    name: Build & Push
    needs: [security-scan, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      owner: ${{ steps.meta.outputs.owner }}
    steps:
      - uses: actions/checkout@v4

      - name: Normalise owner to lowercase
        id: meta
        run: echo "owner=$(echo '${{ env.OWNER }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        run: |
          IMAGE=ghcr.io/${{ steps.meta.outputs.owner }}/app
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:staging" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:staging"

      - name: Build and push notification-service image
        run: |
          IMAGE=ghcr.io/${{ steps.meta.outputs.owner }}/notification-service
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:staging" ./notification-service
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:staging"

      - name: Scan app image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.meta.outputs.owner }}/app:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Scan notification-service image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ steps.meta.outputs.owner }}/notification-service:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

  # ── Trigger deploy on VPS ─────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger staging deploy
        run: |
          curl -sf --max-time 300 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -d '{"sha":"${{ github.sha }}","env":"staging"}' \
            "${{ secrets.STAGING_WEBHOOK_URL }}"

  # ── DAST — scan after deploy ──────────────────────────────────────────────────
  dast:
    name: DAST (ZAP)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://staging.operum.mavellium.com.br'
          fail_action: true

name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/mvloperum/staging
  IMAGE_NAME: mvloperum/app

jobs:
  # ── 1. Run tests ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Adicionado suporte ao PNPM
      - uses: pnpm/action-setup@v3
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # - name: Run tests
      #   run: pnpm run test:run

      # - name: Lint
      #   run: pnpm run lint

  # ── 2. Build Docker image ────────────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:staging \
            .

      - name: Save image to tarball
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            | gzip > app.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: app.tar.gz
          retention-days: 1

 # ── 3. Deploy to VPS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      # 🔴 A MÁGICA ACONTECE AQUI: Recria a chave perfeitamente sem bugs de formatação
      - name: Preparar Chave SSH (Modo Nuclear)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_BASE64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Transfer image and compose files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ~/.ssh/deploy_key # Usando o arquivo puro agora
          source: "app.tar.gz,docker-compose.yml,docker-compose.staging.yml"
          target: /tmp/mvloperum-deploy

      - name: Deploy on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ~/.ssh/deploy_key # Usando o arquivo puro agora
          script: |
            set -e
            mkdir -p /opt/mvloperum/staging
            cp /tmp/mvloperum-deploy/docker-compose*.yml /opt/mvloperum/staging/

            echo "Loading Docker image..."
            docker load < /tmp/mvloperum-deploy/app.tar.gz
            rm -f /tmp/mvloperum-deploy/app.tar.gz

            echo "Tagging image..."
            docker tag mvloperum/app:${{ github.sha }} mvloperum/app:staging

            echo "Restarting app service..."
            cd /opt/mvloperum/staging
            IMAGE_TAG=${{ github.sha }} \
              docker compose -f docker-compose.yml -f docker-compose.staging.yml \
              up -d app --no-deps

            echo "Pruning old images..."
            docker image prune -f
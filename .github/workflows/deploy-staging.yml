# ── 3. Deploy to VPS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    # IMPORTANTE: Eu removi o "environment: staging" daqui para evitar bloqueios de permissão do GitHub
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      # ATUALIZADO PARA @master
      - name: Transfer image and compose files to VPS
        uses: appleboy/scp-action@master 
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "app.tar.gz,docker-compose.yml,docker-compose.staging.yml"
          target: /tmp/mvloperum-deploy

      # ATUALIZADO PARA @master
      - name: Deploy on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /opt/mvloperum/staging
            cp /tmp/mvloperum-deploy/docker-compose*.yml /opt/mvloperum/staging/

            echo "Loading Docker image..."
            docker load < /tmp/mvloperum-deploy/app.tar.gz
            rm -f /tmp/mvloperum-deploy/app.tar.gz

            echo "Tagging image..."
            docker tag mvloperum/app:${{ github.sha }} mvloperum/app:staging

            echo "Restarting app service..."
            cd /opt/mvloperum/staging
            IMAGE_TAG=${{ github.sha }} \
              docker compose -f docker-compose.yml -f docker-compose.staging.yml \
              up -d app --no-deps

            echo "Pruning old images..."
            docker image prune -f
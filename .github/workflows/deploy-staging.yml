name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/mvloperum/staging
  # ghcr.io owner must be lowercase
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── 1. Run tests ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

  # ── 2. Build and push images to ghcr.io ──────────────────────────────────────
  build:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      owner: ${{ steps.meta.outputs.owner }}
    steps:
      - uses: actions/checkout@v4

      - name: Normalise owner to lowercase
        id: meta
        run: echo "owner=$(echo '${{ env.OWNER }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        run: |
          IMAGE=ghcr.io/${{ steps.meta.outputs.owner }}/app
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:staging" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:staging"

      - name: Build and push notification-service image
        run: |
          IMAGE=ghcr.io/${{ steps.meta.outputs.owner }}/notification-service
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:staging" ./notification-service
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:staging"

  # ── 3. Trigger deploy on VPS via webhook ──────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger staging deploy
        run: |
          curl -sf --max-time 300 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -d '{"sha":"${{ github.sha }}","env":"staging"}' \
            "${{ secrets.STAGING_WEBHOOK_URL }}"

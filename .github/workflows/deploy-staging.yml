name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/mvloperum/staging
  IMAGE_NAME: mvloperum/app
  NOTIFICATION_IMAGE: mvloperum/notification-service

jobs:
  # ── 1. Run tests ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 10
          
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

  # ── 2. Build Docker image ────────────────────────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:staging \
            .
          docker build \
            -t ${{ env.NOTIFICATION_IMAGE }}:${{ github.sha }} \
            -t ${{ env.NOTIFICATION_IMAGE }}:staging \
            ./notification-service

      - name: Save images to tarballs
        run: |
          docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} | gzip > app.tar.gz
          docker save ${{ env.NOTIFICATION_IMAGE }}:${{ github.sha }} | gzip > notification-service.tar.gz

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: |
            app.tar.gz
            notification-service.tar.gz
          retention-days: 1

  # ── 3. Deploy to VPS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Transfer image and compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "app.tar.gz,notification-service.tar.gz,docker-compose.yml,docker-compose.staging.yml"
          target: /tmp/mvloperum-deploy

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            export IMAGE_TAG=staging

            mkdir -p ${{ env.DEPLOY_PATH }}
            cp /tmp/mvloperum-deploy/docker-compose*.yml ${{ env.DEPLOY_PATH }}/

            cd ${{ env.DEPLOY_PATH }}

            echo "Checking .env..."
            if [ ! -f .env ]; then
              echo "❌ .env NOT FOUND!"
              exit 1
            fi

            chmod 644 .env

            echo "DEBUG DATABASE_URL:"
            cat .env | grep DATABASE_URL || (echo "❌ DATABASE_URL missing" && exit 1)

            echo "Loading Docker images..."
            docker load < /tmp/mvloperum-deploy/app.tar.gz
            docker load < /tmp/mvloperum-deploy/notification-service.tar.gz
            rm -f /tmp/mvloperum-deploy/app.tar.gz /tmp/mvloperum-deploy/notification-service.tar.gz

            echo "Tagging images..."
            docker tag mvloperum/app:${{ github.sha }} mvloperum/app:staging
            docker tag mvloperum/notification-service:${{ github.sha }} mvloperum/notification-service:staging

            echo "Running database migrations..."
            docker compose \
              --env-file .env \
              -f docker-compose.yml \
              -f docker-compose.staging.yml \
              --profile migration \
              run --rm migrate

            echo "Starting services..."
            docker compose \
              --env-file .env \
              -f docker-compose.yml \
              -f docker-compose.staging.yml \
              up -d app notification-service

            echo "Pruning old images..."
            docker image prune -f

            echo "Staging deploy complete: ${{ github.sha }}"
# Base Docker Compose — used by both staging and production.
# Never use this file alone. Always combine with an environment overlay:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.production.yml up -d

services:

  # ── Monolith (Next.js) ─────────────────────────────────────────────────────
  app:
    image: ghcr.io/${GHCR_OWNER}/app:${IMAGE_TAG}
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      - NODE_ENV=${NODE_ENV}
      - SESSION_SECRET=${SESSION_SECRET}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - API_GATEWAY_INTERNAL_URL=http://api-gateway:4000
      - NOTIFICATION_SERVICE_URL=http://notification-service:4004
      - AUTH_SERVICE_URL=http://auth-service:4001
      - FILE_SERVICE_URL=http://file-service:4005
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - DEFAULT_TENANT_ID=${DEFAULT_TENANT_ID}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    labels:
      - "traefik.enable=true"
      # Port declared here so environment overlays can reference this service by name.
      # Routers (host rules, TLS) are defined per-environment in the overlay files.
      - "traefik.http.services.app-${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - proxy
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      api-gateway:
        condition: service_healthy

  # ── API Gateway (Express) ─────────────────────────────────────────────────
  api-gateway:
    image: ghcr.io/${GHCR_OWNER}/api-gateway:${IMAGE_TAG}
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      - NODE_ENV=${NODE_ENV}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - AUTH_SERVICE_URL=http://auth-service:4001
      - PROJECT_SERVICE_URL=http://project-service:4002
      - SPRINT_SERVICE_URL=http://sprint-service:4003
      - NOTIFICATION_SERVICE_URL=http://notification-service:4004
      - FILE_SERVICE_URL=http://file-service:4005
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PORT=4000
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.api-gateway-${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - proxy
      - internal
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      project-service:
        condition: service_healthy
      sprint-service:
        condition: service_healthy

  # ── Auth Service (NestJS) ──────────────────────────────────────────────────
  auth-service:
    image: ghcr.io/${GHCR_OWNER}/auth-service:${IMAGE_TAG}
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PORT=4001
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── File Service (NestJS) ──────────────────────────────────────────────────
  file-service:
    image: ghcr.io/${GHCR_OWNER}/file-service:${IMAGE_TAG}
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL}
      - PORT=4005
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4005/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Project Service (NestJS) ──────────────────────────────────────────────
  project-service:
    image: ghcr.io/${GHCR_OWNER}/project-service:${IMAGE_TAG}
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - PORT=4002
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  # ── Sprint Service (NestJS) ────────────────────────────────────────────────
  sprint-service:
    image: ghcr.io/${GHCR_OWNER}/sprint-service:${IMAGE_TAG}
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - PORT=4003
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  # ── Notification Service (NestJS) ─────────────────────────────────────────
  notification-service:
    image: ghcr.io/${GHCR_OWNER}/notification-service:${IMAGE_TAG}
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PORT=4004
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Prisma Migrations ─────────────────────────────────────────────────────
  migrate:
    image: ghcr.io/${GHCR_OWNER}/app:${IMAGE_TAG}
    command: prisma migrate deploy
    # No user: "0" — inherits USER nextjs (uid 1001) from the image.
    # Prisma does not need root to run migrations.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    profiles:
      - migration

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    security_opt:
      - no-new-privileges:true
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── MinIO (S3-compatible Storage) ─────────────────────────────────────────
  minio:
    # Pin to a specific release — never use :latest in any environment.
    # Check https://github.com/minio/minio/releases and update periodically.
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    restart: always
    security_opt:
      - no-new-privileges:true
    # Bind console to loopback only — prevents accidental public exposure.
    # Remove --console-address entirely in production to fully disable the console.
    command: server /data --console-address "127.0.0.1:9001"
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "traefik.enable=true"
      # Public API (bucket access)
      - "traefik.http.routers.minio-${COMPOSE_PROJECT_NAME}.rule=Host(`${MINIO_HOST}`)"
      - "traefik.http.routers.minio-${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.minio-${COMPOSE_PROJECT_NAME}.tls.certresolver=myresolver"
      - "traefik.http.services.minio-${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=9000"
    networks:
      - proxy
      - internal

volumes:
  pg-data:
  redis-data:
  minio-data:

networks:
  proxy:
    name: ${COMPOSE_PROJECT_NAME}_proxy
  internal:
    name: ${COMPOSE_PROJECT_NAME}_internal
